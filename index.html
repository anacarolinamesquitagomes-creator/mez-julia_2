// ── CSV Parser ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    vals.push(cur.trim());
    return Object.fromEntries(headers.map((h, i) => [h, (vals[i]||"").replace(/^"|"$/g,"")]));
  });
}

// Normaliza campos CSV para nomes esperados pelo dashboard
function normalizeCadastro(rows) {
  return rows.filter(r => r["Nome"] || r["NOME"]).map((r, i) => ({
    id:              r["#"] || String(i+1).padStart(3,"0"),
    nome:            r["Nome"] || "",
    email:           r["E-mail"] || r["Email"] || "",
    tel:             r["WhatsApp"] || "",
    data:            r["Data 1ª Reunião"] || r["Data 1a Reuniao"] || "",
    statusReuniao:   r["Status Reunião"] || r["Status Reuniao"] || "",
    statusComercial: r["Status Comercial"] || "",
    etapa:           r["Etapa"] || "",
    area:            r["Área de Atuação"] || r["Area de Atuacao"] || "",
    renda:           r["Renda Mensal"] || "",
    obs:             r["Observações"] || r["Obs"] || "",
  }));
}
function normalizePagamentos(rows) {
  return rows.filter(r => r["Cliente"]).map((r, i) => ({
    id:         r["#"] || String(i+1),
    cliente:    r["Cliente"] || "",
    venc:       r["Vencimento"] || "",
    pago:       r["Data Pago"] || "",
    honorarios: parseFloat((r["Honorários (R$)"]||"0").replace(/[^0-9.,]/g,"").replace(",",".")) || 0,
    comissao:   parseFloat((r["★ Comissão Julia 20%"]||r["Comissão Julia 20%"]||"0").replace(/[^0-9.,]/g,"").replace(",",".")) || 0,
    status:     r["Status"] || "",
    forma:      r["Forma"] || "",
    obs:        r["Obs"] || "",
  }));
}
function normalizeReunioes(rows) {
  return rows.filter(r => r["Cliente"]).map((r, i) => ({
    id:        r["#"] || String(i+1),
    cliente:   r["Cliente"] || "",
    data:      r["Data"] || "",
    hora:      r["Horário"] || r["Horario"] || "",
    tipo:      r["Tipo"] || "",
    resp:      r["Responsável"] || r["Responsavel"] || "",
    pauta:     r["Pauta / Notas"] || "",
    resultado: r["Resultado"] || "",
    proxima:   r["Próxima Ação"] || r["Proxima Acao"] || "",
  }));
}

                      </Pie>
                      <Tooltip content={<CustomTooltip />} />
                      <Legend iconType="circle" iconSize={7}
                        formatter={v => (
                          <Mono style={{ fontSize:10, color:C.muted }}>{v}</Mono>
                        )} />
                    </PieChart>
                  </ResponsiveContainer>
                </div>

                {/* Barras verticais */}
                <div style={{ background:C.card, border:`1px solid ${C.cardB}`,
                  borderRadius:14, padding:24 }}>
                  <SectionHead>COMISSÃO JULIA — SITUAÇÃO (R$)</SectionHead>
                  <ResponsiveContainer width="100%" height={210}>
                    <BarChart data={barData} barSize={48}
                      margin={{ top:0, right:0, left:10, bottom:0 }}>
                      <XAxis dataKey="situacao"
                        tick={{ fill:C.muted, fontSize:10, fontFamily:"'DM Mono',monospace" }}
                        axisLine={{ stroke:C.cardB }} tickLine={false} />
                      <YAxis tickFormatter={v=>`R$${v}`}
                        tick={{ fill:C.muted, fontSize:9, fontFamily:"'DM Mono',monospace" }}
                        axisLine={false} tickLine={false} />
                      <Tooltip content={<CustomTooltip />}
                        cursor={{ fill:"rgba(255,255,255,.04)" }} />
                      <Bar dataKey="valor" radius={[5,5,0,0]}>
                        {barData.map((_,i) => <Cell key={i} fill={BAR_COLORS[i]} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>

              {/* Tabelas resumo */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>

                <div style={{ background:C.card, border:`1px solid ${C.cardB}`, borderRadius:14, padding:24 }}>
                  <SectionHead>RESUMO DE LEADS</SectionHead>
                  {[
                    ["Total de indicações",  totalInd,         C.text],
                    ["Reuniões realizadas",  reunFeitas,        C.green],
                    ["Aguardando reunião",   aguardando,        C.muted],
                    ["Aguardando retorno",   countIf(cad,"statusReuniao","🔄 Aguardando retorno"), C.muted],
                    ["Clientes ativas",      ativas,            C.gold],
                    ["Não fecharam",         naoFechou,         C.red],
                    ["Taxa de conversão",    `${taxaConv}%`,    taxaConv>=50 ? C.green : C.sage],
                  ].map(([l,v,c], i, arr) => (
                    <div key={l} style={{ display:"flex", justifyContent:"space-between",
                      alignItems:"center", padding:"9px 0",
                      borderBottom: i<arr.length-1 ? `1px solid ${C.cardB}` : "none" }}>
                      <span style={{ fontSize:11, color:C.muted }}>{l}</span>
                      <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700,
                        fontSize:14, color:c }}>{v}</span>
                    </div>
                  ))}
                </div>

                <div style={{ background:C.card, border:`1px solid ${C.cardB}`, borderRadius:14, padding:24 }}>
                  <SectionHead>FINANCEIRO — JULIA</SectionHead>
                  {[
                    ["Total honorários (clientes)", fmtBRL(honPago),    C.green],
                    ["Total pago à Julia",           fmtBRL(totalPago),  C.gold],
                    ["Comissão pendente",             fmtBRL(pendente),   pendente>0 ? C.red : C.muted],
                    ["Em atraso",                    fmtBRL(atrasado),   atrasado>0 ? C.red : C.muted],
                    ["Parcelas pagas",               parcPagas,          C.green],
                    ["Parcelas pendentes",           parcPend,           C.muted],
                    ["Clientes em programa",         ativas,             C.gold],
                  ].map(([l,v,c], i, arr) => (
                    <div key={l} style={{ display:"flex", justifyContent:"space-between",
                      alignItems:"center", padding:"9px 0",
                      borderBottom: i<arr.length-1 ? `1px solid ${C.cardB}` : "none" }}>
                      <span style={{ fontSize:11, color:C.muted }}>{l}</span>
                      <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700,
                        fontSize:13, color:c }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ════════════════════════════════════════ CADASTRO ════════ */}
          {tab === "cadastro" && (
            <div style={{ animation:"fadeIn .3s ease" }}>
              <div style={{ marginBottom:24 }}>
                <h1 style={{ fontFamily:"'Syne',sans-serif", fontSize:24,
                  fontWeight:800, color:C.cream, letterSpacing:"-.02em", marginBottom:4 }}>
                  Clientes Indicados
                </h1>
                <p style={{ fontSize:10, color:C.muted, letterSpacing:".06em" }}>
                  {cad.length} indicações · Todas via Julia
                </p>
              </div>

              {/* Cards de status rápido */}
              <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
                {[
                  { label:"Fecharam",     val:ativas,    color:C.gold },
                  { label:"Em andamento", val:andamento, color:C.forest },
                  { label:"Não fecharam", val:naoFechou, color:C.red },
                  { label:"Aguardando",   val:aguardando,color:C.sage },
                ].map(({ label, val, color }) => (
                  <div key={label} style={{ background:C.card,
                    border:`1px solid ${C.cardB}`, borderLeft:`3px solid ${color}`,
                    borderRadius:10, padding:"10px 18px",
                    display:"flex", alignItems:"center", gap:12 }}>
                    <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:800,
                      fontSize:20, color }}>{val}</span>
                    <Mono style={{ fontSize:9, color:C.muted, letterSpacing:".1em" }}>{label}</Mono>
                  </div>
                ))}
              </div>

              <div style={{ background:C.card, border:`1px solid ${C.cardB}`,
                borderRadius:14, overflow:"hidden" }}>
                <table>
                  <thead style={{ background:`${C.verde}25` }}>
                    <tr>
                      <TH>#</TH><TH>NOME</TH><TH>ÁREA</TH><TH>DATA REUNIÃO</TH>
                      <TH>STATUS REUNIÃO</TH><TH>STATUS COMERCIAL</TH>
                      <TH>RENDA</TH><TH>ETAPA</TH>
                    </tr>
                  </thead>
                  <tbody>
                    {cad.map((c,i) => (
                      <tr key={c.id} style={{ background: i%2===0 ? "transparent" : `${C.white}018` }}>
                        <TD><Mono style={{ color:C.muted, fontSize:10 }}>{c.id}</Mono></TD>
                        <TD style={{ color:C.cream, fontWeight:500 }}>{c.nome}</TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{c.area || "—"}</Mono></TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{c.data}</Mono></TD>
                        <TD><StatusChip text={c.statusReuniao} /></TD>
                        <TD><StatusChip text={c.statusComercial} /></TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{c.renda || "—"}</Mono></TD>
                        <TD><Mono style={{ fontSize:10, color:c.etapa ? C.gold : C.muted }}>{c.etapa || "—"}</Mono></TD>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ════════════════════════════════════════ PAGAMENTOS ══════ */}
          {tab === "pagamentos" && (
            <div style={{ animation:"fadeIn .3s ease" }}>
              <div style={{ marginBottom:24 }}>
                <h1 style={{ fontFamily:"'Syne',sans-serif", fontSize:24,
                  fontWeight:800, color:C.cream, letterSpacing:"-.02em", marginBottom:4 }}>
                  Pagamentos — Comissões Julia
                </h1>
                <p style={{ fontSize:10, color:C.muted, letterSpacing:".06em" }}>
                  Comissão: 20% dos honorários · Pago mês a mês conforme recebimento
                </p>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:20 }}>
                {[
                  { label:"TOTAL PAGO À JULIA",    val:fmtBRL(totalPago),  color:C.gold },
                  { label:"COMISSÃO PENDENTE",      val:fmtBRL(pendente),   color:pendente>0?C.red:C.muted },
                  { label:"HONORÁRIOS GERADOS",     val:fmtBRL(honPago),    color:C.green },
                  { label:"PARCELAS PAGAS / TOTAL", val:`${parcPagas} / ${pag.length}`, color:C.forest },
                ].map(({ label, val, color }, i) => (
                  <div key={i} style={{ background:C.card,
                    border:`1px solid ${C.cardB}`, borderTop:`2px solid ${color}`,
                    borderRadius:12, padding:"18px 20px" }}>
                    <Mono style={{ fontSize:8, color:C.muted, letterSpacing:".1em",
                      display:"block", marginBottom:10 }}>{label}</Mono>
                    <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:800,
                      fontSize:20, color, letterSpacing:"-.01em" }}>{val}</div>
                  </div>
                ))}
              </div>

              <div style={{ background:C.card, border:`1px solid ${C.cardB}`,
                borderRadius:14, overflow:"hidden" }}>
                <table>
                  <thead style={{ background:`${C.verde}25` }}>
                    <tr>
                      <TH>#</TH><TH>CLIENTE</TH><TH>VENCIMENTO</TH>
                      <TH>DATA PAGO</TH><TH>HONORÁRIOS</TH>
                      <TH>COMISSÃO JULIA 20%</TH><TH>STATUS</TH><TH>FORMA</TH>
                    </tr>
                  </thead>
                  <tbody>
                    {pag.map((p,i) => (
                      <tr key={p.id} style={{ background: i%2===0 ? "transparent" : `${C.white}018` }}>
                        <TD><Mono style={{ color:C.muted, fontSize:10 }}>{p.id}</Mono></TD>
                        <TD style={{ color:C.cream }}>{p.cliente}</TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{p.venc}</Mono></TD>
                        <TD><Mono style={{ fontSize:10, color:p.pago ? C.green : C.muted }}>
                          {p.pago || "—"}</Mono></TD>
                        <TD style={{ color:p.honorarios>0 ? C.cream : C.muted }}>
                          {p.honorarios>0 ? fmtBRL(p.honorarios) : "—"}</TD>
                        <TD style={{ fontFamily:"'Syne',sans-serif", fontWeight:700,
                          color:p.comissao>0 ? C.gold : C.muted }}>
                          {p.comissao>0 ? fmtBRL(p.comissao) : "—"}</TD>
                        <TD><StatusChip text={p.status} /></TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{p.forma || "—"}</Mono></TD>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ════════════════════════════════════════ REUNIÕES ════════ */}
          {tab === "reunioes" && (
            <div style={{ animation:"fadeIn .3s ease" }}>
              <div style={{ marginBottom:24 }}>
                <h1 style={{ fontFamily:"'Syne',sans-serif", fontSize:24,
                  fontWeight:800, color:C.cream, letterSpacing:"-.02em", marginBottom:4 }}>
                  Reuniões
                </h1>
                <p style={{ fontSize:10, color:C.muted, letterSpacing:".06em" }}>
                  {reu.length} reuniões registradas
                </p>
              </div>
              <div style={{ background:C.card, border:`1px solid ${C.cardB}`,
                borderRadius:14, overflow:"hidden" }}>
                <table>
                  <thead style={{ background:`${C.verde}25` }}>
                    <tr>
                      <TH>#</TH><TH>CLIENTE</TH><TH>DATA</TH>
                      <TH>HORÁRIO</TH><TH>TIPO</TH><TH>RESPONSÁVEL</TH>
                      <TH>RESULTADO</TH><TH>PRÓXIMA AÇÃO</TH>
                    </tr>
                  </thead>
                  <tbody>
                    {reu.map((r,i) => (
                      <tr key={r.id} style={{ background: i%2===0 ? "transparent" : `${C.white}018` }}>
                        <TD><Mono style={{ color:C.muted, fontSize:10 }}>{r.id}</Mono></TD>
                        <TD style={{ color:C.cream }}>{r.cliente}</TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{r.data}</Mono></TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{r.hora || "—"}</Mono></TD>
                        <TD><Mono style={{ fontSize:10, color:C.sage }}>{r.tipo}</Mono></TD>
                        <TD><Mono style={{ fontSize:10, color:C.muted }}>{r.resp}</Mono></TD>
                        <TD>{r.resultado ? <StatusChip text={r.resultado} /> : <Mono style={{ color:C.muted }}>—</Mono>}</TD>
                        <TD><Mono style={{ fontSize:10, color:r.proxima ? C.text : C.muted }}>
                          {r.proxima || "—"}</Mono></TD>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </main>

        {/* ── FOOTER ─────────────────────────────────────────────────── */}
        <footer style={{ borderTop:`1px solid ${C.cardB}`, padding:"14px 28px",
          display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <Mono style={{ fontSize:9, color:C.muted, letterSpacing:".1em" }}>
            MEZ CONSULTORIA FINANCEIRA
          </Mono>
          <Mono style={{ fontSize:9, color:C.muted, fontStyle:"italic" }}>
            Clareza muda decisões. Consistência sustenta resultado.
          </Mono>
        </footer>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MEZDashboard));
</script>
</body>
</html>
